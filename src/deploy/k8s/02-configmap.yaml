apiVersion: v1
kind: ConfigMap
metadata:
  name: oneapi-config
  namespace: oneapi
data:
  TZ: "Asia/Ho_Chi_Minh"
  NODE_NAME: "new-api-k8s"
  ERROR_LOG_ENABLED: "true"
  BATCH_UPDATE_ENABLED: "true"
  BATCH_UPDATE_INTERVAL: "5"
  NEW_API_BASE_URL: "http://new-api:3000"
  NEW_API_PUBLIC_BASE_URL: "https://new.api.1api.click"
  PORTAL_BACKEND_PORT: "8081"
  # Keep false unless the direct proxy overwrites X-Forwarded-For before forwarding.
  PORTAL_TRUST_FORWARDED_FOR: "false"
