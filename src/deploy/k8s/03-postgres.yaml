apiVersion: v1
kind: PersistentVolume
metadata:
  name: oneapi-postgres-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: /opt/lib/k8s/data/oneapi/postgres
    server: 172.19.81.149
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: oneapi
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  volumeName: oneapi-postgres-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api-postgres
  namespace: oneapi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: new-api-postgres
  template:
    metadata:
      labels:
        app: new-api-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: TZ
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_DB
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-postgres
  namespace: oneapi
spec:
  type: ClusterIP
  selector:
    app: new-api-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
