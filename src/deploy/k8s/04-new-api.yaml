apiVersion: v1
kind: PersistentVolume
metadata:
  name: oneapi-new-api-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: /opt/lib/k8s/data/oneapi/new-api-data
    server: 172.19.81.149
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: new-api-data
  namespace: oneapi
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: oneapi-new-api-data-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: oneapi-new-api-logs-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: /opt/lib/k8s/data/oneapi/new-api-logs
    server: 172.19.81.149
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: new-api-logs
  namespace: oneapi
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  volumeName: oneapi-new-api-logs-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api
  namespace: oneapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-api
  template:
    metadata:
      labels:
        app: new-api
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h new-api-postgres -U "$NEW_API_POSTGRES_USER" -d "$NEW_API_POSTGRES_DB"; do sleep 2; done
          envFrom:
            - secretRef:
                name: oneapi-secrets
      containers:
        - name: new-api
          image: registry.inviv.vn/oneapi/new-api:latest
          imagePullPolicy: Always
          args:
            - --log-dir
            - /app/logs
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: TZ
            - name: NODE_NAME
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: NODE_NAME
            - name: ERROR_LOG_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: ERROR_LOG_ENABLED
            - name: BATCH_UPDATE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: BATCH_UPDATE_ENABLED
            - name: BATCH_UPDATE_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: BATCH_UPDATE_INTERVAL
            - name: NEW_API_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_USER
            - name: NEW_API_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_PASSWORD
            - name: NEW_API_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_DB
            - name: SQL_DSN
              value: postgres://$(NEW_API_POSTGRES_USER):$(NEW_API_POSTGRES_PASSWORD)@new-api-postgres:5432/$(NEW_API_POSTGRES_DB)?sslmode=disable
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: SESSION_SECRET
            - name: CRYPTO_SECRET
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: CRYPTO_SECRET
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: new-api-data
              mountPath: /data
            - name: new-api-logs
              mountPath: /app/logs
      volumes:
        - name: new-api-data
          persistentVolumeClaim:
            claimName: new-api-data
        - name: new-api-logs
          persistentVolumeClaim:
            claimName: new-api-logs
---
apiVersion: v1
kind: Service
metadata:
  name: new-api
  namespace: oneapi
  labels:
    app: new-api
spec:
  type: NodePort
  selector:
    app: new-api
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30081
