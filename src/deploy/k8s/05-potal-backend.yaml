apiVersion: apps/v1
kind: Deployment
metadata:
  name: potal-backend
  namespace: oneapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: potal-backend
  template:
    metadata:
      labels:
        app: potal-backend
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h new-api-postgres -U "$NEW_API_DB_USER" -d "$NEW_API_POSTGRES_DB"; do sleep 2; done
          env:
            - name: NEW_API_DB_USER
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_USER
            - name: NEW_API_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_DB
      containers:
        - name: potal-backend
          image: registry.inviv.vn/oneapi/potal-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: PORTAL_BACKEND_PORT
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: PORTAL_BACKEND_PORT
            - name: NEW_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: NEW_API_BASE_URL
            - name: NEW_API_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: NEW_API_PUBLIC_BASE_URL
            - name: PORTAL_TRUST_FORWARDED_FOR
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: PORTAL_TRUST_FORWARDED_FOR
            - name: NEW_API_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_DB
            - name: NEW_API_DB_URL
              value: jdbc:postgresql://new-api-postgres:5432/$(NEW_API_POSTGRES_DB)
            - name: NEW_API_DB_USER
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_USER
            - name: NEW_API_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: potal-backend
  namespace: oneapi
spec:
  type: NodePort
  selector:
    app: potal-backend
  ports:
    - name: http
      port: 8081
      targetPort: http
      nodePort: 30084
