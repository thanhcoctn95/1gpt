apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: new-api
  namespace: oneapi
  labels:
    app: new-api
spec:
  selector:
    matchLabels:
      app: new-api
  namespaceSelector:
    matchNames:
      - oneapi
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: new-api-alerts
  namespace: oneapi
  labels:
    app: new-api
spec:
  groups:
    - name: new-api.rules
      rules:
        - alert: NewApiPodRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="oneapi", pod=~"new-api-.*", container="new-api"}[10m]) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: New API pod restarted
            description: New API container restarted in the last 10 minutes.
        - alert: NewApiHigh5xxRate
          expr: sum(rate(new_api_http_requests_total{namespace="oneapi", status=~"5.."}[5m])) / clamp_min(sum(rate(new_api_http_requests_total{namespace="oneapi"}[5m])), 0.001) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: New API 5xx rate is high
            description: More than 5% of New API requests are returning 5xx responses for 5 minutes.
        - alert: NewApiV1High5xxRate
          expr: sum(rate(new_api_http_requests_total{namespace="oneapi", route=~"/v1.*", status=~"5.."}[5m])) / clamp_min(sum(rate(new_api_http_requests_total{namespace="oneapi", route=~"/v1.*"}[5m])), 0.001) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: New API /v1 5xx rate is high
            description: More than 5% of /v1 requests are returning 5xx responses for 5 minutes.
        - alert: NewApiHighLatency
          expr: histogram_quantile(0.95, sum by (le) (rate(new_api_http_request_duration_seconds_bucket{namespace="oneapi"}[5m]))) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: New API p95 latency is high
            description: New API p95 latency is above 2 seconds for 10 minutes.
        - alert: NewApiV1HighLatency
          expr: histogram_quantile(0.95, sum by (le) (rate(new_api_http_request_duration_seconds_bucket{namespace="oneapi", route=~"/v1.*"}[5m]))) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: New API /v1 p95 latency is high
            description: New API /v1 p95 latency is above 2 seconds for 10 minutes.
        - alert: NewApiDatabaseConnectionFailure
          expr: absent(new_api_db_up{namespace="oneapi"}) or min_over_time(new_api_db_up{namespace="oneapi"}[5m]) == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: New API database connection failure
            description: New API cannot ping the primary database, or Prometheus is not receiving the database health metric.
---
