apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api-user-portal
  namespace: oneapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-api-user-portal
  template:
    metadata:
      labels:
        app: new-api-user-portal
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h new-api-postgres -U "$NEW_API_PG_USER" -d "$NEW_API_PG_DB"; do sleep 2; done
          env:
            - name: NEW_API_PG_USER
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_USER
            - name: NEW_API_PG_DB
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_DB
      containers:
        - name: new-api-user-portal
          image: registry.inviv.vn/oneapi/potal-frontend:20260704-131926-frontend-rebuild-amd64
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: PORT
              value: "3010"
            - name: NEW_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: oneapi-config
                  key: NEW_API_BASE_URL
            - name: NEW_API_PG_HOST
              value: new-api-postgres
            - name: NEW_API_PG_PORT
              value: "5432"
            - name: NEW_API_PG_USER
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_USER
            - name: NEW_API_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_PASSWORD
            - name: NEW_API_PG_DB
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NEW_API_POSTGRES_DB
          readinessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-user-portal
  namespace: oneapi
spec:
  type: NodePort
  selector:
    app: new-api-user-portal
  ports:
    - name: http
      port: 3010
      targetPort: http
      nodePort: 30085
