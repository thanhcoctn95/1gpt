apiVersion: v1
kind: PersistentVolume
metadata:
  name: oneapi-9router-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: /opt/lib/k8s/data/oneapi/9router-data
    server: 172.19.81.149
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: 9router-data
  namespace: oneapi
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: oneapi-9router-data-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 9router
  namespace: oneapi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: 9router
  template:
    metadata:
      labels:
        app: 9router
    spec:
      containers:
        - name: 9router
          image: decolua/9router@sha256:35717c131f695106f62087bc5915f9ddba992ea32d58b0fb12790ab69def944a
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 20128
          env:
            - name: PORT
              value: "20128"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: production
            - name: DATA_DIR
              value: /app/data
            - name: BASE_URL
              value: https://router.1api.click
            - name: NEXT_PUBLIC_BASE_URL
              value: https://router.1api.click
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NINE_ROUTER_JWT_SECRET
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NINE_ROUTER_API_KEY_SECRET
            - name: MACHINE_ID_SALT
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NINE_ROUTER_MACHINE_ID_SALT
            - name: INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NINE_ROUTER_INITIAL_PASSWORD
            - name: REQUIRE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NINE_ROUTER_REQUIRE_API_KEY
                  optional: true
            - name: ENABLE_REQUEST_LOGS
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NINE_ROUTER_ENABLE_REQUEST_LOGS
                  optional: true
            - name: OBSERVABILITY_ENABLED
              valueFrom:
                secretKeyRef:
                  name: oneapi-secrets
                  key: NINE_ROUTER_OBSERVABILITY_ENABLED
                  optional: true
            - name: AUTH_COOKIE_SECURE
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: 9router-data
              mountPath: /app/data
      volumes:
        - name: 9router-data
          persistentVolumeClaim:
            claimName: 9router-data
---
apiVersion: v1
kind: Service
metadata:
  name: nine-router
  namespace: oneapi
  labels:
    app: 9router
spec:
  type: NodePort
  selector:
    app: 9router
  ports:
    - name: http
      port: 20128
      targetPort: http
      nodePort: 30086
